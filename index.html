<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Boat Rental PRO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🚤 Boat Rental PRO</h1>
  <p>Rezervē laivu tiešsaistē</p>
</header>

<section id="boats"></section>

<!-- BOOKING MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <span id="close">&times;</span>

    <h2 id="boatName"></h2>

    <label>Start datums:</label>
    <input type="datetime-local" id="start">

    <label>Beigu datums:</label>
    <input type="datetime-local" id="end">

    <button onclick="calculatePrice()">Aprēķināt cenu</button>

    <p id="price"></p>

    <button onclick="confirmBooking()">Apstiprināt rezervāciju</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
